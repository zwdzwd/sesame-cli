name: conda-build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, name: linux-64}
          - {os: macos-14,      name: osx-arm64}
          # osx-64 (macos-13, Intel) dropped: GitHub is retiring Intel runners,
          # so those jobs queue indefinitely. osx-arm64 covers modern Macs.
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive          # YAME + its nested htslib

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict

      - name: Install conda-build
        run: conda install -n base -y conda-build anaconda-client

      - name: Build package
        run: conda build -c conda-forge --output-folder "$RUNNER_TEMP/bld" conda-recipe/

      # The runner's own glibc is far newer than what users have. If the recipe
      # ever stops pinning the 2.17 sysroot, the binary silently picks up
      # symbols from the runner's glibc and dies at startup on normal machines
      # (this is exactly how 0.2.0 build 0 shipped broken). Fail the build here
      # instead of finding out from a bug report.
      - name: Check glibc floor (linux-64)
        if: matrix.name == 'linux-64'
        run: |
          pkg=$(ls "$RUNNER_TEMP"/bld/linux-64/sesame-cli-*.conda)
          work=$(mktemp -d); cd "$work"
          python -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]).extractall('.')" "$pkg"
          tar -xf pkg-*.tar.zst
          max=$(objdump -T bin/sesame | grep -oE 'GLIBC_[0-9.]+' | sort -uV | tail -1)
          echo "highest glibc symbol version required: $max"
          # sort -V puts the higher of the two last; if that is not 2.17, the
          # binary needs something newer than the pinned sysroot provides.
          if [ "$(printf '%s\nGLIBC_2.17\n' "$max" | sort -V | tail -1)" != "GLIBC_2.17" ]; then
            echo "::error::binary requires $max, above the pinned GLIBC_2.17 floor" >&2
            objdump -T bin/sesame | grep -E 'GLIBC_2\.(1[89]|[2-9][0-9])' >&2 || true
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-${{ matrix.name }}
          path: ${{ runner.temp }}/bld/**/*.conda
          if-no-files-found: error

      - name: Publish to zhou-lab (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          if [ -z "${ANACONDA_TOKEN:-}" ]; then
            echo "ANACONDA_TOKEN secret is not set; cannot publish." >&2
            exit 1
          fi
          # guard: the pushed tag must match the recipe version
          version=$(sed -n 's/.*set version = "\(.*\)".*/\1/p' conda-recipe/meta.yaml)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "tag v$tag does not match recipe version $version; bump meta.yaml" >&2
            exit 1
          fi
          for pkg in "$RUNNER_TEMP"/bld/*/*.conda; do
            echo "uploading $pkg"
            conda run -n base anaconda -t "$ANACONDA_TOKEN" upload -u zhou-lab --label main --force "$pkg"
          done
