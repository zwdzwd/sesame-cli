{% set name = "sesame-cli" %}
{% set version = "0.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  # In-repo recipe: build the checked-out tree (with its vendored YAME/htslib
  # submodule). CI builds the pushed commit; a release build = check out the
  # vX.Y.Z tag, then conda build.
  path: ..

build:
  # 1: rebuilt against the pinned glibc 2.17 sysroot. The 0.2.0 build 0 linux-64
  # package was built against glibc 2.39 headers and aborts at startup on any
  # host with glibc < 2.38.
  number: 1
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    # Pins the glibc/macOS SDK the binary is built against (see
    # conda_build_config.yaml) and adds the matching `__glibc >=2.17` /
    # `__osx >=11.0` run constraint, so the package will not install on a host
    # that is too old to run it.
    - {{ stdlib('c') }}
    - make
  host:
    - zlib
    - libcurl
  run:
    # zlib and libcurl each carry run_exports that pin the runtime automatically;
    # listed for clarity.
    - zlib
    - libcurl

test:
  commands:
    - sesame version

about:
  home: https://github.com/zwdzwd/sesame-cli
  license: AGPL-3.0-or-later
  license_family: AGPL
  license_file: LICENSE
  summary: Standalone C reimplementation of sesame's Infinium methylation preprocessing (IDAT -> betas), with QC, DML, and CNV.
  description: |
    sesame-cli is a dependency-light C program that reproduces the sesame /
    openSesame Infinium DNA-methylation workflow without R or Bioconductor:
    read IDAT pairs, run the QCDPB preprocessing (qualityMask,
    inferInfiniumIChannel, dyeBiasNL, pOOBAH, noob), and emit betas as YAME
    .cg files. It also computes the sesameQC panel, per-probe differential
    methylation (DML), and copy-number segmentation (log2 ratios, genome bins,
    and circular binary segmentation). The IDAT reader and un-preprocessed betas
    are bit-identical to the R package; other steps match to documented
    tolerances (see NUMERICS.md). Platform annotations are fetched on demand.
    The only runtime dependencies are zlib and libcurl.
  dev_url: https://github.com/zwdzwd/sesame-cli

extra:
  recipe-maintainers:
    - zwdzwd
